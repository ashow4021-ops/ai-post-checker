<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿チェッカーAI</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f0f2f5;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  min-height: 100vh;
}

.header {
  padding: 15px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
}

.input-area {
  padding: 15px;
  border-bottom: 1px solid #ddd;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #1da1f2;
  color: white;
  cursor: pointer;
}

.result {
  padding: 15px;
  white-space: pre-wrap;
  line-height: 1.6;
}

.loading {
  padding: 15px;
  color: gray;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
投稿チェッカーAI
</div>

<div class="input-area">
<input id="post" placeholder="投稿内容を入力">
<button onclick="send()">チェックする</button>
</div>

<div id="output" class="result"></div>

</div>

<script>
async function send() {
  const text = document.getElementById("post").value;
  const output = document.getElementById("output");

  if (!text) {
    output.innerText = "⚠️ 投稿を入力してください";
    return;
  }

  output.innerHTML = "<div class='loading'>AIが分析中...</div>";

  try {
    const res = await fetch("https://ai-post-checker.onrender.com/api", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    output.innerText = data.result;

  } catch (err) {
    output.innerText = "エラーが発生しました";
    console.error(err);
  }
}
</script>

</body>
</html>
``
